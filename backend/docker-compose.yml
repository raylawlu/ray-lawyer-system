version: "3.8"

services:
  api:
    build: ./api
    image: ray-lawyer-api:0.1.0
    restart: unless-stopped
    environment:
      TZ: Asia/Shanghai
      APP_SECRET: "Arthas19870522"
      INIT_ADMIN_USER: "admin"
      INIT_ADMIN_PASS: "Zhonghao@2016"
      DB_PATH: "/data/ray.db"
    volumes:
      - ./data:/data
    expose:
      - "8080"

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./web/index.html:/usr/share/nginx/html/index.html:ro
      - ./web/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
