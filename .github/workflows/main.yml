name: build-and-push-api

on:
  push:
    branches: ["main"]
  workflow_dispatch: {}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Debug workspace
        run: |
          echo "PWD=$(pwd)"
          echo "GITHUB_WORKSPACE=$GITHUB_WORKSPACE"
          ls -la
          echo "---- api dir ----"
          ls -la api || true
          echo "---- tree (depth 3) ----"
          find . -maxdepth 3 -type f | sed -n '1,200p'

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./api
          
          - name: Debug workspace
  run: |
    pwd
    ls -la
    ls -la api || true
    find. -maxdepth 3 -type f | sed -n '1,200p'
          file: ./api/Dockerfile
          push: true
          tags: |
            ghcr.io/raylawlu/ray-lawyer-api:0.1.0
            ghcr.io/raylawlu/ray-lawyer-api:latest
